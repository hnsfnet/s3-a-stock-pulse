app:
  name: "StockPulse 记账"
  version: "1.0.0"
  theme: "light"
  color_theme: "blue"
  window_size: [1200, 800]

database:
  path: null
  filename: "ledger.db"

logging:
  level: "INFO"
  directory: "logs"
  filename: "app_{date}.log"
  max_bytes: 10485760
  backup_count: 30
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

budget:
  default_cycle: "monthly"
  warning_threshold: 0.8
  danger_threshold: 1.0

ui:
  sidebar_width: 180
  font_family: "Microsoft YaHei"
  font_size: 14
  date_format: "%Y-%m-%d"
  datetime_format: "%Y-%m-%d %H:%M:%S"

chart:
  figure_dpi: 100
  default_figsize: [6, 4]
  font_families:
    - "Microsoft YaHei"
    - "SimHei"
    - "Arial Unicode MS"
